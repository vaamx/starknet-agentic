<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-labelledby="title desc" style="image-rendering:pixelated">
  <title id="title">HiveCaster Mascot v2</title>
  <desc id="desc">Pixel robot tamagotchi v2 — wider, eyebrows, more expression. Animated.</desc>

  <!-- ═══ DARK BACKGROUND ═══ -->
  <rect width="32" height="32" fill="#07111e"/>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-0.4;0,0" dur="2.6s" repeatCount="indefinite"/>

    <!-- ═══ ANTENNA ═══ -->
    <!-- ball — pulsing LED -->
    <rect x="15" y="1" width="2" height="2" fill="#64ffe8">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <!-- stem -->
    <rect x="15" y="3" width="2" height="2" fill="#7ce8ff" opacity="0.5"/>

    <!-- ═══ SHELL (wider: 22px body) ═══ -->
    <!-- top edge -->
    <rect x="5" y="6" width="22" height="1" fill="#7ce8ff" opacity="0.7"/>
    <!-- left wall -->
    <rect x="4" y="7" width="1" height="17" fill="#7ce8ff" opacity="0.7"/>
    <!-- right wall -->
    <rect x="27" y="7" width="1" height="17" fill="#7ce8ff" opacity="0.7"/>
    <!-- bottom edge -->
    <rect x="5" y="24" width="22" height="1" fill="#7ce8ff" opacity="0.7"/>
    <!-- pixel chamfer corners -->
    <rect x="4" y="6" width="1" height="1" fill="#7ce8ff" opacity="0.2"/>
    <rect x="27" y="6" width="1" height="1" fill="#7ce8ff" opacity="0.2"/>
    <rect x="4" y="24" width="1" height="1" fill="#7ce8ff" opacity="0.2"/>
    <rect x="27" y="24" width="1" height="1" fill="#7ce8ff" opacity="0.2"/>
    <!-- shell fill -->
    <rect x="5" y="7" width="22" height="17" fill="#0a1e33"/>
    <!-- top inner highlight -->
    <rect x="5" y="7" width="22" height="1" fill="white" opacity="0.04"/>

    <!-- ═══ SCREEN (inset) ═══ -->
    <rect x="7" y="9" width="18" height="13" fill="#06192c"/>
    <!-- screen border glow -->
    <rect x="7" y="9" width="18" height="1" fill="#7ce8ff" opacity="0.12"/>
    <rect x="7" y="21" width="18" height="1" fill="#7ce8ff" opacity="0.06"/>
    <rect x="7" y="10" width="1" height="11" fill="#7ce8ff" opacity="0.08"/>
    <rect x="24" y="10" width="1" height="11" fill="#7ce8ff" opacity="0.06"/>

    <!-- scanline sweep -->
    <rect x="7" y="10" width="18" height="1" fill="#7ce8ff" opacity="0.15">
      <animate attributeName="y" values="10;21;10" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.06;0.18" dur="2.6s" repeatCount="indefinite"/>
    </rect>

    <!-- ═══ EYEBROWS ═══ -->
    <!-- left brow — angled down-inward (determined look) -->
    <rect x="9"  y="11" width="3" height="1" fill="#7ce8ff" opacity="0.6"/>
    <rect x="12" y="12" width="1" height="1" fill="#7ce8ff" opacity="0.35"/>
    <!-- right brow — mirror -->
    <rect x="20" y="11" width="3" height="1" fill="#7ce8ff" opacity="0.6"/>
    <rect x="19" y="12" width="1" height="1" fill="#7ce8ff" opacity="0.35"/>

    <!-- ═══ EYES (3×2 — wider, more presence) ═══ -->
    <!-- left eye -->
    <rect x="9" y="13" width="3" height="2" fill="#7ce8ff">
      <animate attributeName="height" values="2;0.3;2" keyTimes="0;0.44;0.46" dur="5s" repeatCount="indefinite"/>
    </rect>
    <!-- left glint -->
    <rect x="9" y="13" width="1" height="1" fill="white" opacity="0.35"/>

    <!-- right eye -->
    <rect x="20" y="13" width="3" height="2" fill="#7ce8ff">
      <animate attributeName="height" values="2;0.3;2" keyTimes="0;0.44;0.46" dur="5s" repeatCount="indefinite"/>
    </rect>
    <!-- right glint -->
    <rect x="20" y="13" width="1" height="1" fill="white" opacity="0.35"/>

    <!-- ═══ NOSE / CENTER SENSOR ═══ -->
    <rect x="15" y="14" width="2" height="1" fill="#3bb8e8" opacity="0.25"/>

    <!-- ═══ MOUTH — slight smirk ═══ -->
    <rect x="12" y="17" width="7" height="1" fill="#7ce8ff" opacity="0.55"/>
    <!-- smirk uptick on right -->
    <rect x="19" y="16" width="1" height="1" fill="#7ce8ff" opacity="0.35"/>

    <!-- ═══ CHEEK VENTS (robot detail) ═══ -->
    <!-- left vents -->
    <rect x="5" y="13" width="2" height="1" fill="#3bb8e8" opacity="0.15"/>
    <rect x="5" y="15" width="2" height="1" fill="#3bb8e8" opacity="0.12"/>
    <rect x="5" y="17" width="2" height="1" fill="#3bb8e8" opacity="0.09"/>
    <!-- right vents -->
    <rect x="25" y="13" width="2" height="1" fill="#3bb8e8" opacity="0.15"/>
    <rect x="25" y="15" width="2" height="1" fill="#3bb8e8" opacity="0.12"/>
    <rect x="25" y="17" width="2" height="1" fill="#3bb8e8" opacity="0.09"/>

    <!-- ═══ CHIN PLATE ═══ -->
    <rect x="10" y="19" width="12" height="1" fill="#7ce8ff" opacity="0.08"/>

    <!-- ═══ SPARK LEDs ═══ -->
    <!-- top-right LED -->
    <rect x="25" y="7" width="2" height="2" fill="#64ffe8">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <!-- top-left LED (dimmer) -->
    <rect x="5" y="7" width="2" height="2" fill="#7ce8ff">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
    </rect>

    <!-- ═══ FEET / LANDING PADS ═══ -->
    <rect x="7"  y="25" width="4" height="2" fill="#7ce8ff" opacity="0.4"/>
    <rect x="21" y="25" width="4" height="2" fill="#7ce8ff" opacity="0.4"/>
    <!-- grounding ticks -->
    <rect x="8"  y="27" width="2" height="1" fill="#3bb8e8" opacity="0.15"/>
    <rect x="22" y="27" width="2" height="1" fill="#3bb8e8" opacity="0.15"/>

    <!-- ═══ PANEL SEAMS (robotic detail) ═══ -->
    <rect x="15" y="7" width="2" height="1" fill="white" opacity="0.03"/>
    <rect x="5"  y="20" width="22" height="1" fill="white" opacity="0.02"/>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 28" role="img" aria-labelledby="title desc" style="image-rendering:pixelated">
  <title id="title">HiveCaster Mascot</title>
  <desc id="desc">Pixel robot tamagotchi — antenna, shell, screen, eyes, mouth, spark, feet. Animated.</desc>

  <!-- Whole mascot bobs up/down -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-0.5;0,0" dur="2.4s" repeatCount="indefinite"/>

    <!-- ── Antenna ──────────────────────────────────── -->
    <!-- ball -->
    <rect x="11" y="0" width="2" height="2" fill="#7ce8ff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <!-- stem -->
    <rect x="11" y="2" width="2" height="3" fill="#7ce8ff" opacity="0.6"/>

    <!-- ── Shell body ───────────────────────────────── -->
    <!-- top edge -->
    <rect x="5" y="6" width="14" height="1" fill="#7ce8ff" opacity="0.8"/>
    <!-- left wall -->
    <rect x="4" y="7" width="1" height="16" fill="#7ce8ff" opacity="0.8"/>
    <!-- right wall -->
    <rect x="19" y="7" width="1" height="16" fill="#7ce8ff" opacity="0.8"/>
    <!-- bottom edge -->
    <rect x="5" y="23" width="14" height="1" fill="#7ce8ff" opacity="0.8"/>
    <!-- corner chamfer -->
    <rect x="4" y="6" width="1" height="1" fill="#7ce8ff" opacity="0.3"/>
    <rect x="19" y="6" width="1" height="1" fill="#7ce8ff" opacity="0.3"/>
    <rect x="4" y="23" width="1" height="1" fill="#7ce8ff" opacity="0.3"/>
    <rect x="19" y="23" width="1" height="1" fill="#7ce8ff" opacity="0.3"/>
    <!-- fill -->
    <rect x="5" y="7" width="14" height="16" fill="#071a2e"/>
    <!-- top highlight -->
    <rect x="5" y="7" width="14" height="1" fill="white" opacity="0.05"/>

    <!-- ── Screen ───────────────────────────────────── -->
    <rect x="7" y="9" width="10" height="12" fill="#082238"/>
    <!-- screen border -->
    <rect x="7" y="9" width="10" height="1" fill="#7ce8ff" opacity="0.15"/>
    <rect x="7" y="20" width="10" height="1" fill="#7ce8ff" opacity="0.1"/>
    <rect x="7" y="10" width="1" height="10" fill="#7ce8ff" opacity="0.1"/>
    <rect x="16" y="10" width="1" height="10" fill="#7ce8ff" opacity="0.1"/>

    <!-- Scanline sweep -->
    <rect x="7" y="10" width="10" height="1" fill="#7ce8ff" opacity="0.2">
      <animate attributeName="y" values="10;19;10" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.1;0.25" dur="2.4s" repeatCount="indefinite"/>
    </rect>

    <!-- ── Eyes (blink via height) ──────────────────── -->
    <rect x="9" y="12" width="2" height="2" fill="#7ce8ff">
      <animate attributeName="height" values="2;0.2;2" keyTimes="0;0.44;0.46" dur="4.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="13" y="12" width="2" height="2" fill="#7ce8ff">
      <animate attributeName="height" values="2;0.2;2" keyTimes="0;0.44;0.46" dur="4.8s" repeatCount="indefinite"/>
    </rect>
    <!-- eye glints -->
    <rect x="9" y="12" width="1" height="1" fill="white" opacity="0.2"/>
    <rect x="13" y="12" width="1" height="1" fill="white" opacity="0.2"/>

    <!-- ── Mouth ────────────────────────────────────── -->
    <rect x="10" y="16" width="4" height="1" fill="#7ce8ff" opacity="0.7"/>

    <!-- ── Circuit traces ───────────────────────────── -->
    <rect x="5" y="14" width="2" height="1" fill="#3bb8e8" opacity="0.2"/>
    <rect x="5" y="16" width="1" height="1" fill="#3bb8e8" opacity="0.15"/>
    <rect x="17" y="14" width="2" height="1" fill="#3bb8e8" opacity="0.2"/>
    <rect x="18" y="16" width="1" height="1" fill="#3bb8e8" opacity="0.15"/>

    <!-- ── Spark LED ────────────────────────────────── -->
    <rect x="18" y="7" width="2" height="2" fill="#7ce8ff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
    </rect>

    <!-- ── Feet ─────────────────────────────────────── -->
    <rect x="6" y="24" width="3" height="2" fill="#7ce8ff" opacity="0.5"/>
    <rect x="15" y="24" width="3" height="2" fill="#7ce8ff" opacity="0.5"/>
    <rect x="7" y="26" width="1" height="1" fill="#3bb8e8" opacity="0.2"/>
    <rect x="16" y="26" width="1" height="1" fill="#3bb8e8" opacity="0.2"/>
  </g>
</svg>
